<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)"/>
  <rect width="320" height="180" fill="url(#glow)"/>
  <!-- Grid lines -->
  <line x1="0" y1="45" x2="320" y2="45" stroke="rgba(139,92,246,0.08)" stroke-width="1"/>
  <line x1="0" y1="90" x2="320" y2="90" stroke="rgba(139,92,246,0.08)" stroke-width="1"/>
  <line x1="0" y1="135" x2="320" y2="135" stroke="rgba(139,92,246,0.08)" stroke-width="1"/>
  <line x1="80" y1="0" x2="80" y2="180" stroke="rgba(139,92,246,0.08)" stroke-width="1"/>
  <line x1="160" y1="0" x2="160" y2="180" stroke="rgba(139,92,246,0.08)" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="180" stroke="rgba(139,92,246,0.08)" stroke-width="1"/>
  <!-- LIVE badge -->
  <rect x="110" y="62" width="100" height="36" rx="8" fill="rgba(239,68,68,0.9)"/>
  <circle cx="128" cy="80" r="5" fill="#fff" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <text x="161" y="85" text-anchor="middle" font-family="'Syne',sans-serif" font-size="15" font-weight="700" fill="#fff" letter-spacing="2">LIVE</text>
  <!-- GamersHub label -->
  <text x="160" y="128" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="rgba(148,163,184,0.6)" letter-spacing="0.5">GAMERSHUB STREAM</text>
</svg>
