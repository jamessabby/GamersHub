<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GamersHub – Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="../css/theme.css"/>
  <link rel="stylesheet" href="../css/pages/login.css"/>
</head>
<body>

  <nav class="navbar-custom d-flex align-items-center justify-content-between px-4">
    <a href="#" class="navbar-brand-custom">
      <img src="../assets/img/logo.png" alt="GamersHub" class="nav-logo"
           onerror="this.style.display='none'"/>
    </a>
    <div class="nav-links d-flex gap-4 align-items-center">
      <a href="#" class="nav-link-item active">Home</a>
      <a href="#" class="nav-link-item">Tournaments</a>
      <a href="#" class="nav-link-item">Login</a>
    </div>
  </nav>

  <div class="main-layout container-fluid p-0">
    <div class="row g-0 h-100">

      <div class="col-6 left-col d-flex align-items-start">
        <div class="image-wrapper">
          <img src="../assets/img/valo-cover.jpg" alt="Valorant Cover" class="cover-img"/>
        </div>
      </div>

      <div class="col-6 right-col d-flex align-items-center justify-content-center">
        <div class="login-card">
          <h2 class="card-title">Welcome to GamersHub</h2>
          <p class="card-subtitle">Login to your account</p>

          <div class="form-group-custom">
            <label class="field-label">USERNAME</label>
            <input type="text" class="input-field" placeholder="Enter username or email" id="username"/>
          </div>

          <div class="form-group-custom mt-3">
            <label class="field-label">PASSWORD</label>
            <input type="password" class="input-field" placeholder="Enter password" id="password"/>
          </div>

          <div class="d-flex justify-content-between align-items-center mt-2">
            <a href="#" class="link-small">Forgot password?</a>
            <span class="link-small-muted">Don't have an account? <a href="#" class="link-small">Sign in</a></span>
          </div>

          <div class="divider-row">
            <span class="divider-text">or</span>
          </div>

          <button class="btn-google" id="googleBtn">
            <img src="../assets/icons/google-logo.svg" alt="Google" class="google-icon"/>
            <span class="btn-google-text">Or sign in with Google</span>
          </button>

          <button class="btn-login" id="loginBtn">Login</button>
        </div>
      </div>

    </div>
  </div>

  <script src="../js/pages/login.js"></script>
</body>
</html>
