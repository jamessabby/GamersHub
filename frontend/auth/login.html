<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GamersHub – Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="../shared/css/theme.css" />
    <link rel="stylesheet" href="./css/login.css" />
  </head>
  <body>
    <div class="stars" id="stars"></div>

    <nav
      class="navbar-custom d-flex align-items-center justify-content-between px-4"
    >
      <a href="#" class="navbar-brand-custom">
        <img
          src="../assets/icons/gamershub-logo.png"
          alt="GamersHub"
          class="nav-logo"
          onerror="this.style.display='none'"
        />
      </a>
      <div class="nav-links d-flex gap-4 align-items-center">
        <a href="#" class="nav-link-item active">Home</a>
        <a href="#" class="nav-link-item">Tournaments</a>
        <a href="#" class="nav-link-item">Login</a>
      </div>
    </nav>

    <div class="main-layout container-fluid p-0">
      <div class="row g-0 h-100">
        <!-- LEFT: IMAGE CAROUSEL -->
        <div class="col-6 left-col d-flex align-items-start">
          <div class="image-wrapper">
            <div class="carousel-track" id="carouselTrack">
              <div class="carousel-slide active">
                <img
                  src="../assets/img/login/valo-cover.jpg"
                  alt="Valorant"
                  class="cover-img"
                />
              </div>

              <div class="carousel-slide">
                <img
                  src="../assets/img/login/ml-cover.jpg"
                  alt="Mobile Legends"
                  class="cover-img"
                />
              </div>

              <div class="carousel-slide">
                <img
                  src="../assets/img/login/codm-cover.jpg"
                  alt="CS2"
                  class="cover-img"
                />
              </div>

              <div class="carousel-slide">
                <img
                  src="../assets/img/login/pubg-cover.jpg"
                  alt="League of Legends"
                  class="cover-img"
                />
              </div>
            </div>

            <!-- overlay gradient sits above images -->
            <div class="image-overlay"></div>

            <!-- label is INSIDE wrapper, above overlay -->
            <div class="slide-label" id="slideLabel">
              <span class="game-tag" id="gameTag">VALORANT</span>
              <p class="game-desc" id="gameDesc">
                Tactical 5v5 character-based shooter
              </p>
            </div>

            <!-- DOTS -->
            <div class="carousel-dots" id="carouselDots">
              <button class="dot active" data-index="0"></button>
              <button class="dot" data-index="1"></button>
              <button class="dot" data-index="2"></button>
              <button class="dot" data-index="3"></button>
            </div>

            <!-- ARROWS -->
            <button class="carousel-arrow arrow-prev" id="arrowPrev">
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
              >
                <polyline points="15 18 9 12 15 6" />
              </svg>
            </button>
            <button class="carousel-arrow arrow-next" id="arrowNext">
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
              >
                <polyline points="9 18 15 12 9 6" />
              </svg>
            </button>

            <!-- PROGRESS BAR -->
            <div class="carousel-progress">
              <div class="carousel-progress-bar" id="progressBar"></div>
            </div>
          </div>
        </div>

        <!-- RIGHT: LOGIN CARD -->
        <div
          class="col-6 right-col d-flex align-items-center justify-content-center"
        >
          <div class="login-card" id="loginCard">
            <div class="card-glow-ring"></div>

            <div class="card-header-area">
              <div class="brand-icon">
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                  <circle
                    cx="14"
                    cy="14"
                    r="12"
                    stroke="url(#iconGrad)"
                    stroke-width="1.5"
                  />
                  <circle
                    cx="14"
                    cy="14"
                    r="5"
                    fill="url(#iconGrad)"
                    opacity="0.8"
                  />
                  <defs>
                    <linearGradient id="iconGrad" x1="2" y1="2" x2="26" y2="26">
                      <stop stop-color="#a78bfa" />
                      <stop offset="1" stop-color="#7c3aed" />
                    </linearGradient>
                  </defs>
                </svg>
              </div>
              <h2 class="card-title">
                Welcome to <span class="title-accent">GamersHub</span>
              </h2>
              <p class="card-subtitle">
                Sign in with your account or continue with Google
              </p>
            </div>

            <div class="lockout-banner d-none" id="lockoutBanner">
              <span class="lockout-icon">🔒</span>
              <span
                >Too many attempts. Try again in
                <strong id="countdownTimer">15:00</strong></span
              >
            </div>

            <div class="form-group-custom">
              <label class="field-label">USERNAME</label>
              <div class="input-wrap">
                <input
                  type="text"
                  class="input-field"
                  placeholder="Enter username"
                  id="username"
                  autocomplete="off"
                  autocapitalize="off"
                  spellcheck="false"
                />
              </div>
              <p class="error-message" id="usernameError"></p>
            </div>

            <div class="form-group-custom">
              <label class="field-label">PASSWORD</label>
              <div class="input-wrap">
                <input
                  type="password"
                  class="input-field"
                  placeholder="Enter password"
                  id="password"
                  autocomplete="new-password"
                />
                <button
                  class="toggle-password"
                  id="togglePassword"
                  tabindex="-1"
                >
                  <svg
                    id="eyeIcon"
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                    <circle cx="12" cy="12" r="3" />
                  </svg>
                </button>
              </div>
              <p class="error-message" id="passwordError"></p>
            </div>

            <div
              class="form-meta d-flex justify-content-between align-items-center"
            >
              <a href="../auth/forgot-password.html" class="link-small"
                >Forgot password?</a
              >
              <span class="link-small-muted"
                >No account?
                <a href="../auth/register.html" class="link-small"
                  >Sign up</a
                ></span
              >
            </div>

            <button class="btn-login" id="loginBtn">
              <span class="btn-text">Login</span>
              <span class="btn-loader d-none" id="btnLoader"></span>
            </button>

            <div class="divider-row">
              <span class="divider-line"></span>
              <span class="divider-text">or continue with</span>
              <span class="divider-line"></span>
            </div>

            <div class="social-buttons">
              <button class="btn-social btn-google-s" id="googleBtn">
                <svg width="18" height="18" viewBox="0 0 18 18">
                  <path
                    d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"
                    fill="#4285F4"
                  />
                  <path
                    d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"
                    fill="#34A853"
                  />
                  <path
                    d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"
                    fill="#FBBC05"
                  />
                  <path
                    d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"
                    fill="#EA4335"
                  />
                </svg>
                <span>Google</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="../shared/js/auth-state.js"></script>
    <script src="./js/login.js"></script>
  </body>
</html>
