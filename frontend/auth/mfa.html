<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MFA - GamersHub</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="../css/theme.css"/>
  <link rel="stylesheet" href="../css/pages/mfa.css"/>
</head>
<body>

  <nav class="navbar navbar-dark px-4">
    <a class="navbar-brand" href="#">
      <img src="../assets/icons/gamershub-logo.png" alt="GamersHub Logo" height="40"/>
    </a>
    <div class="nav-links">
      <a href="#" class="nav-link active">Home</a>
      <a href="#" class="nav-link">Tournaments</a>
      <a href="#" class="nav-link">Login</a>
    </div>
  </nav>

  <div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center">
    <div class="mfa-card">
      <h2 class="mfa-title">Multi-factor Authentication</h2>
      <p class="mfa-subtitle">Please enter the verification code sent to your email</p>
      <div class="mfa-form">
        <label class="mfa-label">CODE</label>
        <input type="text" class="mfa-input" placeholder="Type the code" id="mfaCode"/>
        <div class="d-flex justify-content-center mt-3">
          <button class="mfa-btn" id="verifyBtn">Verify</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/pages/mfa.js"></script>
</body>
</html>
