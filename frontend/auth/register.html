<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GamersHub – Register</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="../css/theme.css"/>
  <link rel="stylesheet" href="../css/pages/register.css"/>
</head>
<body>

  <!-- NAVBAR: copied verbatim from login.html -->
  <nav class="navbar-custom d-flex align-items-center justify-content-between px-4">
    <a href="#" class="navbar-brand-custom">
      <img src="../assets/icons/gamershub-logo.png" alt="GamersHub" class="nav-logo"
           onerror="this.style.display='none'"/>
    </a>
    <div class="nav-links d-flex gap-4 align-items-center">
      <a href="#" class="nav-link-item active">Home</a>
      <a href="#" class="nav-link-item">Tournaments</a>
      <a href="#" class="nav-link-item">Login</a>
    </div>
  </nav>

  <div class="main-layout container-fluid p-0">
    <div class="row g-0 h-100">

      <div class="col-6 left-col d-flex align-items-start">
        <div class="image-wrapper">
          <img src="../assets/img/ml-cover.jpg" alt="Mobile Legends Cover" class="cover-img"/>
        </div>
      </div>

      <div class="col-6 right-col d-flex align-items-center justify-content-center">
        <div class="register-card">

          <h2 class="card-title">Welcome to GamersHub</h2>
          <p class="card-subtitle">Sign in to your account</p>

          <div class="form-group-custom">
            <label class="field-label">NAME</label>
            <input type="text" class="input-field" placeholder="Type your name" id="firstName"/>
          </div>

          <div class="form-group-custom">
            <label class="field-label">NAME</label>
            <input type="text" class="input-field" placeholder="Type your name" id="lastName"/>
          </div>

          <div class="form-group-custom">
            <label class="field-label">EMAIL</label>
            <input type="email" class="input-field" placeholder="Type your email" id="email"/>
          </div>

          <div class="form-group-custom">
            <label class="field-label">PASSWORD</label>
            <input type="password" class="input-field" placeholder="Type your password" id="password"/>
          </div>

          <div class="form-group-custom">
            <label class="field-label">CONFIRM PASSWORD</label>
            <input type="password" class="input-field" placeholder="Confirm your password" id="confirmPassword"/>
          </div>

          <div class="divider-row">
            <span class="divider-text">or</span>
          </div>

          <button class="btn-google" id="googleBtn">
            <img src="../assets/icons/google-logo.svg" alt="Google" class="google-icon"/>
            <span class="btn-google-text">Or sign in with Google</span>
          </button>

          <div class="already-row">
            <span class="link-small-muted">Already have an account? <a href="#" class="link-small">Log in</a></span>
          </div>

          <div class="signin-row">
            <button class="btn-signin" id="signInBtn">Sign in</button>
          </div>

        </div>
      </div>

    </div>
  </div>

  <script src="../js/pages/register.js"></script>
</body>
</html>
