<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GamersHub – The Heart of DLSUD Esports</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="css/theme.css"/>
  <link rel="stylesheet" href="css/pages/landing.css"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-dark gh-navbar">
    <div class="container-fluid px-4">
      <a class="navbar-brand p-0" href="#">
        <img src="assets/icons/gamershub-logo.png" alt="GamersHub Logo" height="32"/>
      </a>
      <div class="gh-nav-links d-flex align-items-center gap-4">
        <a href="#" class="gh-nav-link active">Home</a>
        <a href="#" class="gh-nav-link">Tournaments</a>
        <a href="#" class="gh-nav-link" id="nav-login">Login</a>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <main class="gh-hero min-vh-100 d-flex align-items-center justify-content-center text-center container-fluid">
    <div class="gh-hero-inner">
      <img src="assets/icons/gamershub-logo.png" alt="GamersHub" class="gh-hero-logo"/>
      <h1 class="gh-headline">The Heart of DLSUD Esports</h1>
      <p class="gh-subtext">One platform for verified matchmaking, official university<br class="d-none d-md-inline"/> tournaments, and real-time student interaction</p>
      <div class="d-flex flex-column flex-md-row gap-3 justify-content-center mt-4">
        <button class="gh-btn-primary" id="btn-get-started">Get started &rarr;</button>
        <button class="gh-btn-secondary">Learn more</button>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/pages/landing.js"></script>
</body>
</html>
