<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GamersHub - Events</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="./css/dashboard.css" />
    <link rel="stylesheet" href="./css/events.css" />
  </head>
  <body>
    <nav class="top-nav" id="topNav">
      <div class="nav-inner">
        <a href="#" class="nav-logo-wrap">
          <img
            src="../assets/img/logo.png"
            alt="GamersHub"
            class="nav-logo"
            onerror="this.style.display='none'"
          />
        </a>

        <div class="search-wrap">
          <svg
            class="search-icon"
            width="15"
            height="15"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input
            type="text"
            class="search-input"
            id="searchInput"
            placeholder="Search events, games, schools"
          />
        </div>

        <div class="nav-right">
          <button class="nav-bell" id="bellBtn" aria-label="Notifications">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
              <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
          </button>
          <a href="#" class="nav-link-item">Home</a>
          <a href="#" class="nav-link-item">Tournaments</a>
          <button class="nav-account">
            <img
              src="../assets/icons/player-dashboard-icons/user-profile.png"
              alt="Account"
              class="nav-avatar"
              onerror="this.style.background='rgba(124,58,237,0.4)'"
            />
            <span data-gh-user="username">Account</span>
          </button>
        </div>
      </div>
    </nav>

    <div class="page-body">
      <aside class="left-sidebar">
        <div class="sidebar-brand">
          <img
            src="../assets/img/logo.png"
            alt="GamersHub"
            class="sidebar-logo"
            onerror="this.style.display='none'"
          />
          <span class="sidebar-brand-name">GamersHub</span>
        </div>

        <nav class="sidebar-nav">
          <a href="./dashboard.html" class="sidebar-link" data-page="home">
            <span class="sidebar-icon">
              <img src="../assets/icons/player-sidebar/home-icon.png" alt="" />
            </span>
            <span>Home</span>
          </a>
          <a href="./livestream.html" class="sidebar-link" data-page="livestreams">
            <span class="sidebar-icon">
              <img
                src="../assets/icons/player-sidebar/livestream-icon.svg"
                alt=""
              />
            </span>
            <span>Livestreams</span>
          </a>
          <a href="./events.html" class="sidebar-link active" data-page="events">
            <span class="sidebar-icon">
              <img src="../assets/icons/player-sidebar/events-icon.svg" alt="" />
            </span>
            <span>Events</span>
          </a>
          <a href="./profile.html" class="sidebar-link" data-page="profile">
            <span class="sidebar-icon">
              <img src="../assets/icons/player-sidebar/profile-icon.svg" alt="" />
            </span>
            <span>Profile</span>
          </a>
        </nav>

        <a href="../auth/logout-confirm.html" class="sidebar-logout">
          <span class="sidebar-icon">
            <img src="../assets/icons/player-sidebar/logout-icon.svg" alt="" />
          </span>
          <span>Logout</span>
        </a>
      </aside>

      <main class="events-main events-main--solo">
        <div class="gh-page-heading events-page-heading">
          <span class="gh-page-kicker">Campus Events</span>
          <h1 class="gh-page-title">Events</h1>
          <p class="gh-page-subtitle">Published campus and esports events from the GamersHub team.</p>
        </div>

        <div class="events-filters" id="eventsFilters">
          <button type="button" class="events-pill active" data-filter="all">All</button>
          <button type="button" class="events-pill" data-filter="gaming">Gaming</button>
          <button type="button" class="events-pill" data-filter="workshop">Workshop</button>
          <button type="button" class="events-pill" data-filter="social">Social</button>
          <button type="button" class="events-pill" data-filter="tournament">Tournament</button>
        </div>

        <div id="eventsLoading" class="events-loading-state">Loading events…</div>

        <div id="eventsList" class="events-list events-list--hidden"></div>

        <div id="eventsEmpty" class="events-empty hidden">
          <div class="events-empty-icon">📅</div>
          <p class="events-empty-title">No events yet</p>
          <p class="events-empty-sub">Check back soon — organizers will publish events here.</p>
        </div>
      </main>
    </div>

    <script src="../shared/js/auth-state.js" defer></script>
    <script src="../shared/js/player-shell.js" defer></script>
    <script src="./js/events.js" defer></script>
  </body>
</html>
