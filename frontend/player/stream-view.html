<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GamersHub - Stream View</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="./css/dashboard.css" />
    <link rel="stylesheet" href="./css/stream-view.css" />
    <link rel="stylesheet" href="../shared/css/responsive.css" />
  </head>
  <body>
    <nav class="top-nav" id="topNav">
      <div class="nav-inner">
        <a href="#" class="nav-logo-wrap">
          <img
            src="../assets/img/logo.png"
            alt="GamersHub"
            class="nav-logo"
            onerror="this.style.display='none'"
          />
        </a>

        <div class="search-wrap">
          <svg
            class="search-icon"
            width="15"
            height="15"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input
            type="text"
            class="search-input"
            placeholder="Search streams, players, games"
            id="searchInput"
          />
        </div>

        <div class="nav-right">
          <button class="nav-bell" id="bellBtn" aria-label="Notifications">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
              <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
          </button>
          <a href="#" class="nav-link-item">Home</a>
          <a href="#" class="nav-link-item">Tournaments</a>
          <button class="nav-account">
            <img
              src="../assets/icons/player-dashboard-icons/user-profile.png"
              alt="Account"
              class="nav-avatar"
              onerror="this.style.background='rgba(124,58,237,0.4)'"
            />
            <span data-gh-user="username">Account</span>
          </button>
        </div>
      </div>
    </nav>

    <div class="page-body">
      <aside class="left-sidebar" id="leftSidebar">
        <div class="sidebar-brand">
          <img
            src="../assets/img/logo.png"
            alt="GamersHub"
            class="sidebar-logo"
            onerror="this.style.display='none'"
          />
          <span class="sidebar-brand-name">GamersHub</span>
        </div>

        <nav class="sidebar-nav">
          <a href="../player/dashboard.html" class="sidebar-link" data-page="home">
            <span class="sidebar-icon">
              <img src="../assets/icons/player-sidebar/home-icon.png" alt="" />
            </span>
            <span>Home</span>
          </a>
          <a
            href="../player/livestream.html"
            class="sidebar-link active"
            data-page="livestreams"
          >
            <span class="sidebar-icon">
              <img
                src="../assets/icons/player-sidebar/livestream-icon.svg"
                alt=""
              />
            </span>
            <span>Livestreams</span>
          </a>
          <a href="../player/events.html" class="sidebar-link" data-page="events">
            <span class="sidebar-icon">
              <img src="../assets/icons/player-sidebar/events-icon.svg" alt="" />
            </span>
            <span>Events</span>
          </a>
          <a href="../player/profile.html" class="sidebar-link" data-page="profile">
            <span class="sidebar-icon">
              <img src="../assets/icons/player-sidebar/profile-icon.svg" alt="" />
            </span>
            <span>Profile</span>
          </a>
        </nav>

        <a href="../auth/logout-confirm.html" class="sidebar-logout">
          <span class="sidebar-icon">
            <img src="../assets/icons/player-sidebar/logout-icon.svg" alt="" />
          </span>
          <span>Logout</span>
        </a>
      </aside>

      <main class="main-feed stream-view-feed">
        <section class="gh-page-shell">
          <div class="gh-page-heading">
            <span class="gh-page-kicker">Broadcast Room</span>
            <h1 class="gh-page-title" id="streamPageTitle">Stream View</h1>
            <p class="gh-page-subtitle" id="streamPageSubtitle">
              Loading the selected broadcast from the stream database.
            </p>
          </div>

          <section class="stream-player-wrap stream-player-empty" id="streamPlayerWrap"></section>

          <div class="stream-actions stream-actions-empty" id="streamActions"></div>

          <div class="stream-info-block stream-info-block-empty" id="streamInfoBlock"></div>
        </section>
      </main>

      <aside class="right-sidebar comments-panel" id="commentsPanel">
        <div class="comments-header">
          <h3 class="comments-title">Comments</h3>
          <div
            class="comments-live-indicator comments-live-indicator-muted"
            id="commentsLiveIndicator"
          >
            0 live comments
          </div>
        </div>

        <div class="comments-empty-state" id="commentsEmptyState">
          <div>
            <div class="gh-empty-icon">CHAT</div>
            <p class="comments-empty-title">No live chat yet</p>
            <p class="comments-empty-sub">
              Comments will appear here once an active stream and real viewers
              are present.
            </p>
          </div>
        </div>
        <ul class="comments-list hidden" id="commentsList"></ul>

        <div class="comment-input-row">
          <div class="comment-input-avatar">
            <img
              src="../assets/icons/player-dashboard-icons/user-profile.png"
              alt=""
              onerror="this.style.background='rgba(124,58,237,0.3)'"
            />
          </div>
          <div class="comment-input-wrap">
            <input
              type="text"
              class="comment-input"
              placeholder="Commenting will unlock during real live sessions"
              id="commentInput"
            />
            <button
              class="comment-send-btn"
              id="sendCommentBtn"
              aria-label="Send"
            >
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
              >
                <line x1="22" y1="2" x2="11" y2="13" />
                <polygon points="22 2 15 22 11 13 2 9 22 2" />
              </svg>
            </button>
          </div>
        </div>
      </aside>
    </div>

    <script src="../shared/js/auth-state.js"></script>
    <script src="../shared/js/player-shell.js"></script>
    <script src="./js/stream-view.js"></script>
  </body>
</html>
