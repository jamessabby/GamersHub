<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GamersHub – Tournament Summary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="./css/dashboard.css" />
    <link rel="stylesheet" href="./css/tournament-summary.css" />
    <link rel="stylesheet" href="../shared/css/responsive.css" />
  </head>
  <body>
    <nav class="top-nav" id="topNav">
      <div class="nav-inner">
        <a href="./tournaments.html" class="nav-logo-wrap">
          <img
            src="../assets/img/logo.png"
            alt="GamersHub"
            class="nav-logo"
            onerror="this.style.display='none'"
          />
        </a>

        <div class="search-wrap">
          <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="text" class="search-input" placeholder="Search tournaments…" id="searchInput" />
        </div>

        <div class="nav-right">
          <button class="nav-bell" id="bellBtn" aria-label="Notifications" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
              <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
          </button>
          <a href="./tournaments.html" class="nav-link-item nav-link-active">Tournaments</a>
          <button class="nav-account" id="navAccount" type="button">
            <img src="../assets/icons/player-dashboard-icons/user-profile.png" alt="Account"
                 class="nav-avatar" onerror="this.style.background='rgba(124,58,237,0.4)'" />
            <span id="navAccountName" data-gh-user="username">Account</span>
          </button>
        </div>
      </div>
    </nav>

    <div class="page-body">
      <aside class="left-sidebar" id="leftSidebar">
        <div class="sidebar-brand">
          <img src="../assets/img/logo.png" alt="GamersHub" class="sidebar-logo"
               onerror="this.style.display='none'" />
          <span class="sidebar-brand-name">GamersHub</span>
        </div>
        <nav class="sidebar-nav">
          <a href="./dashboard.html" class="sidebar-link" data-page="home">
            <span class="sidebar-icon">
              <img src="../assets/icons/player-sidebar/home-icon.png" alt="" />
            </span>
            <span>Home</span>
          </a>
          <a href="./livestream.html" class="sidebar-link" data-page="livestreams">
            <span class="sidebar-icon">
              <img src="../assets/icons/player-sidebar/livestream-icon.svg" alt="" />
            </span>
            <span>Livestreams</span>
          </a>
          <a href="./events.html" class="sidebar-link" data-page="events">
            <span class="sidebar-icon">
              <img src="../assets/icons/player-sidebar/events-icon.svg" alt="" />
            </span>
            <span>Events</span>
          </a>
          <a href="./profile.html" class="sidebar-link" data-page="profile">
            <span class="sidebar-icon">
              <img src="../assets/icons/player-sidebar/profile-icon.svg" alt="" />
            </span>
            <span>Profile</span>
          </a>
        </nav>
        <a href="../auth/logout-confirm.html" class="sidebar-logout">
          <span class="sidebar-icon">
            <img src="../assets/icons/player-sidebar/logout-icon.svg" alt="" />
          </span>
          <span>Logout</span>
        </a>
      </aside>

      <main class="sum-main" id="sumMain">
        <!-- Hero header -->
        <div class="sum-hero" id="sumHero">
          <a href="./tournaments.html" class="sum-back-link">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
            All Tournaments
          </a>
          <h1 class="sum-title" id="sumTitle">Tournament Summary</h1>
          <p class="sum-meta" id="sumMeta"></p>
        </div>

        <!-- Loading / error state -->
        <div class="sum-loading" id="sumLoading">
          <div class="sum-spinner"></div>
          <p>Loading tournament data…</p>
        </div>

        <!-- Content sections (hidden until data loads) -->
        <div class="sum-body hidden" id="sumBody">

          <!-- Leaderboard -->
          <section class="sum-section">
            <h2 class="sum-section-title">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="8" r="6"/>
                <path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/>
              </svg>
              Standings
            </h2>
            <div class="sum-table-wrap">
              <table class="sum-table">
                <thead>
                  <tr>
                    <th class="sum-rank-col">#</th>
                    <th>Team</th>
                    <th>W</th>
                    <th>L</th>
                    <th>Pts</th>
                  </tr>
                </thead>
                <tbody id="leaderboardBody">
                  <tr><td colspan="5" class="sum-empty">No standings yet.</td></tr>
                </tbody>
              </table>
            </div>
          </section>

          <!-- Match schedule -->
          <section class="sum-section">
            <h2 class="sum-section-title">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              Match Results
            </h2>
            <div class="sum-matches" id="matchBody">
              <p class="sum-empty">No matches scheduled.</p>
            </div>
          </section>

        </div>
      </main>

      <aside class="right-sidebar">
        <h3 class="friends-title">Friends</h3>
        <ul class="friends-list"></ul>
      </aside>
    </div>

    <script src="../shared/js/auth-state.js" defer></script>
    <script src="../shared/js/player-shell.js" defer></script>
    <script src="./js/tournament-summary.js" defer></script>
  </body>
</html>
