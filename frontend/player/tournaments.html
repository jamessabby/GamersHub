<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GamersHub - Tournaments</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="./css/dashboard.css" />
    <link rel="stylesheet" href="./css/tournaments.css" />
    <link rel="stylesheet" href="../shared/css/responsive.css" />
  </head>
  <body>
    <nav class="top-nav" id="topNav">
      <div class="nav-inner">
        <a href="#" class="nav-logo-wrap">
          <img
            src="../assets/img/logo.png"
            alt="GamersHub"
            class="nav-logo"
            onerror="this.style.display='none'"
          />
        </a>

        <div class="search-wrap">
          <svg
            class="search-icon"
            width="15"
            height="15"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input
            type="text"
            class="search-input"
            placeholder="Search tournaments, teams, games..."
            id="searchInput"
          />
        </div>

        <div class="nav-right">
          <button class="nav-bell" id="bellBtn" aria-label="Notifications">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
              <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
          </button>
          <a href="#" class="nav-link-item">Home</a>
          <a href="#" class="nav-link-item nav-link-active">Tournaments</a>
          <button class="nav-account" id="navAccount">
            <img
              src="../assets/icons/player-dashboard-icons/user-profile.png"
              alt="Account"
              class="nav-avatar"
              onerror="this.style.background='rgba(124,58,237,0.4)'"
            />
            <span id="navAccountName" data-gh-user="username">Account</span>
          </button>
        </div>
      </div>
    </nav>

    <div class="page-body">
      <aside class="left-sidebar" id="leftSidebar">
        <div class="sidebar-brand">
          <img
            src="../assets/img/logo.png"
            alt="GamersHub"
            class="sidebar-logo"
            onerror="this.style.display='none'"
          />
          <span class="sidebar-brand-name">GamersHub</span>
        </div>

        <nav class="sidebar-nav">
          <a href="./dashboard.html" class="sidebar-link" data-page="home">
            <span class="sidebar-icon">
              <img src="../assets/icons/player-sidebar/home-icon.png" alt="" />
            </span>
            <span>Home</span>
          </a>
          <a href="./livestream.html" class="sidebar-link" data-page="livestreams">
            <span class="sidebar-icon">
              <img src="../assets/icons/player-sidebar/livestream-icon.svg" alt="" />
            </span>
            <span>Livestreams</span>
          </a>
          <a href="./events.html" class="sidebar-link" data-page="events">
            <span class="sidebar-icon">
              <img src="../assets/icons/player-sidebar/events-icon.svg" alt="" />
            </span>
            <span>Events</span>
          </a>
          <a href="./profile.html" class="sidebar-link" data-page="profile">
            <span class="sidebar-icon">
              <img src="../assets/icons/player-sidebar/profile-icon.svg" alt="" />
            </span>
            <span>Profile</span>
          </a>
        </nav>

        <a href="../auth/logout-confirm.html" class="sidebar-logout">
          <span class="sidebar-icon">
            <img src="../assets/icons/player-sidebar/logout-icon.svg" alt="" />
          </span>
          <span>Logout</span>
        </a>
      </aside>

      <main class="trn-main" id="trnMain">
        <div class="trn-page-header">
          <h1 class="trn-page-title">Tournaments</h1>
          <p class="trn-page-subtitle">
            Browse active tournaments and join with a code if your team has been approved.
          </p>
        </div>

        <!-- Join with Code panel -->
        <section class="trn-join-panel" id="trnJoinPanel">
          <div class="trn-join-inner">
            <div class="trn-join-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </div>
            <div class="trn-join-copy">
              <h3 class="trn-join-title">Have a join code?</h3>
              <p class="trn-join-sub">Enter the code your team received after registration approval.</p>
            </div>
            <button class="trn-join-toggle" id="joinCodeToggle" type="button">Enter Code</button>
          </div>
          <div class="trn-join-form hidden" id="joinCodeForm">
            <input
              type="text"
              class="trn-join-input"
              id="joinCodeInput"
              placeholder="e.g. A3F72B1C"
              maxlength="16"
              spellcheck="false"
            />
            <button class="trn-join-btn" id="joinCodeBtn" type="button">Join</button>
            <p class="trn-join-error" id="joinCodeError"></p>
          </div>
          <div class="trn-join-success hidden" id="joinCodeSuccess">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="#4ade80" stroke-width="2.5">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            <span id="joinCodeSuccessMsg">Successfully joined!</span>
          </div>
        </section>

        <section class="trn-list" id="trnList" aria-label="Tournament listings"></section>
      </main>

      <aside class="right-sidebar">
        <h3 class="friends-title">Friends</h3>
        <ul class="friends-list"></ul>
      </aside>
    </div>

    <script src="../shared/js/auth-state.js" defer></script>
    <script src="../shared/js/player-shell.js" defer></script>
    <script src="./js/tournaments.js" defer></script>
  </body>
</html>
